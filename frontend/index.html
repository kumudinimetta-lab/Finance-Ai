<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance AI - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container glass-panel">
        <h1 class="brand-title">Finance AI</h1>
        <p class="subtitle">Your intelligent financial advisor</p>
        
        <div id="login-section">
            <h2>Sign In</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn primary-btn">Login</button>
            </form>
            <p class="toggle-text">Don't have an account? <span id="show-register">Register here</span></p>
        </div>

        <div id="register-section" class="hidden">
            <h2>Create Account</h2>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit" class="btn primary-btn">Register</button>
            </form>
            <p class="toggle-text">Already have an account? <span id="show-login">Login here</span></p>
        </div>
        
        <div id="auth-error" class="error-msg hidden"></div>
    </div>
    
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('token')) {
                window.location.href = 'dashboard.html';
            }
            document.getElementById('show-register').addEventListener('click', () => {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.remove('hidden');
                document.getElementById('auth-error').classList.add('hidden');
            });
            document.getElementById('show-login').addEventListener('click', () => {
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('auth-error').classList.add('hidden');
            });
        });
    </script>
</body>
</html>
